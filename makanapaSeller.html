<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakanApa? — Seller Dashboard</title>
    <meta name="description" content="Manage your food offers and receive orders in real-time.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="makanapa.css">
</head>

<body class="seller-theme flex flex-col items-center p-4 min-h-screen">

    <!-- ── TOAST CONTAINER ── -->
    <div id="toast-container"></div>

    <!-- ── CONFIG MODAL ── -->
    <div id="auth-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden"
         style="background:rgba(13,148,136,0.12); backdrop-filter:blur(8px);">
        <div class="bg-white p-8 rounded-[28px] shadow-2xl max-w-sm w-full text-center"
             style="border:2px solid rgba(13,148,136,0.25); animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;">
            <div class="text-5xl mb-4">🏪</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Shop Setup</h2>
            <p class="text-sm text-gray-500 mb-6">Your shop name &amp; WA number appear on every offer.</p>
            <input type="text" id="auth-name" placeholder="Shop Name (e.g. Warung Budi)"
                class="w-full p-3 border-2 border-teal-100 rounded-2xl mb-3 outline-none focus:border-teal-400 text-sm transition-all">
            <input type="number" id="auth-phone" placeholder="WhatsApp: 0812345678"
                class="w-full p-3 border-2 border-teal-100 rounded-2xl mb-6 outline-none focus:border-teal-400 text-sm transition-all">
            <button onclick="saveConfig()"
                class="w-full text-white font-bold py-3 rounded-2xl transition-all active:scale-95 shadow-lg"
                style="background:linear-gradient(135deg,#0D9488,#14B8A6); box-shadow:0 8px 20px rgba(13,148,136,0.4);">
                Save &amp; Start Selling 🚀
            </button>
        </div>
    </div>

    <!-- ── MAIN APP CARD ── -->
    <div class="w-full max-w-2xl glass-card rounded-[28px] shadow-2xl overflow-hidden relative"
         style="border:2px solid rgba(13,148,136,0.2);">

        <!-- HEADER -->
        <header style="background:linear-gradient(135deg,#0D9488,#14B8A6);" class="p-4 text-white">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-2xl flex items-center justify-center text-xl">🍳</div>
                    <div>
                        <h1 class="text-lg font-bold leading-none">Seller Center</h1>
                        <p class="text-[11px] text-white/70">Real-time order dashboard</p>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <!-- New Order Badge: persistent counter, click to open dashboard -->
                    <button id="new-order-badge" onclick="openSellerHistory()"
                        class="new-order-badge hidden">
                        <i class="fa-solid fa-bell"></i> New Order!
                    </button>

                    <button onclick="openSellerHistory()"
                        class="bg-white/20 hover:bg-white/30 text-white text-xs font-semibold px-3 py-2 rounded-xl transition-all border border-white/20">
                        <i class="fa-solid fa-chart-line text-sm"></i>
                    </button>

                    <button onclick="openConfig()"
                        class="bg-white/20 hover:bg-white/30 text-white p-2 rounded-xl transition-all hover:rotate-45 duration-300">
                        <i class="fa-solid fa-gear text-sm"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- SUB-HEADER -->
        <div class="px-4 py-3 flex items-center justify-between border-b"
             style="background:rgba(13,148,136,0.06); border-color:rgba(13,148,136,0.12);">
            <div>
                <h2 class="font-bold text-sm" style="color:#0D9488;">📋 Active Buyer Requests</h2>
                <p class="text-[11px] text-gray-400">AI Smart Price active • Refreshes every 5s</p>
            </div>
            <div id="seller-earnings-chip" class="text-right hidden">
                <div class="text-[10px] text-gray-400 uppercase font-semibold tracking-wide">Today's Earnings</div>
                <div class="font-bold text-sm text-teal-600">Rp <span id="today-earnings">0</span></div>
            </div>
        </div>

        <!-- REQUESTS LIST -->
        <div id="seller-requests" class="h-[72vh] overflow-y-auto p-4 flex flex-col gap-0">
            <div class="text-center text-gray-400 mt-14 italic text-sm">
                <div class="text-4xl mb-3">🍳</div>
                No active requests yet…<br>
                <span class="text-xs">Buyers will appear here in real-time</span>
            </div>
        </div>
    </div>

    <!-- ── SELLER HISTORY / SALES MODAL ── -->
    <div id="seller-history-modal" class="fixed inset-0 bg-black/50 hidden items-end justify-center z-50">
        <div class="bg-white w-full max-w-lg relative flex flex-col"
             style="border-radius:28px 28px 0 0; max-height:88vh; animation: slideUp 0.36s cubic-bezier(0.34,1.2,0.64,1) both;">
            <div class="p-5 border-b flex justify-between items-center flex-shrink-0">
                <div>
                    <div class="font-bold text-xl">Sales Dashboard</div>
                    <div class="text-sm text-gray-400 mt-0.5">
                        Today: <span id="seller-today-total" class="font-bold text-teal-600">Rp 0</span>
                    </div>
                </div>
                <button onclick="closeSellerHistory()"
                    class="w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition-all">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="seller-history-list" class="p-4 overflow-y-auto flex-1 space-y-3"></div>
        </div>
    </div>

    <!-- ── SCRIPTS ── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="makanapa.js"></script>
</body>

</html>
