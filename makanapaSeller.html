<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakanApa? - Seller Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="makanapa.css">
</head>
<body class="seller-theme flex flex-col items-center p-4 min-h-screen">

    <div id="auth-modal" class="fixed inset-0 bg-blue-50 z-[100] flex flex-col items-center justify-center hidden">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border-4 border-blue-500">
            <div class="text-4xl mb-4">⚙️</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Configuration</h2>
            <p class="text-sm text-gray-500 mb-6">Set your phone number for orders.</p>
            
            <input type="text" id="auth-name" placeholder="Your Name" class="w-full p-3 border-2 border-blue-100 rounded-xl mb-3 outline-none focus:border-blue-500">
            <input type="number" id="auth-phone" placeholder="Example: 0812345678" class="w-full p-3 border-2 border-blue-100 rounded-xl mb-6 outline-none focus:border-blue-500">
            
            <button onclick="saveConfig()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Save & Close</button>
        </div>
    </div>

    <div class="w-full max-w-2xl glass-card rounded-3xl shadow-2xl overflow-hidden border-4 border-blue-500 relative">
        
        <header class="bg-blue-600 p-4 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>🍕</span> Seller Center
            </h1>
            <button onclick="openConfig()" class="hover:rotate-90 transition-all duration-300">
                <i class="fa-solid fa-gear text-xl"></i>
            </button>
        </header>

        <div id="seller-view" class="block bg-transparent flex flex-col">
            <div class="p-4 bg-blue-100/50 border-b border-blue-200">
                <h2 class="font-bold text-blue-800">📋 Active Requests</h2>
                <p class="text-xs text-blue-600">Give your best offer! AI Smart Price is active.</p>
            </div>
            
            <div id="seller-requests" class="h-[70vh] overflow-y-auto p-4 flex flex-col gap-3">
                <div class="text-center text-gray-400 mt-10 italic">No active requests yet...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="makanapa.js"></script>
</body>
</html>
