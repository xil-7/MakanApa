<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakanApa? - Buyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="makanapa.css">
</head>

<body class="buyer-theme flex flex-col items-center p-4 min-h-screen">
    <div id="auth-modal" class="fixed inset-0 bg-orange-50 z-[100] flex flex-col items-center justify-center hidden">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border-4 border-orange-500">
            <div class="text-4xl mb-4">⚙️</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Configuration</h2>
            <p class="text-sm text-gray-500 mb-6">Set your phone number for orders.</p>
            
            <input type="text" id="auth-name" placeholder="Your Name" class="w-full p-3 border-2 border-orange-100 rounded-xl mb-3 outline-none focus:border-orange-500">
            <input type="number" id="auth-phone" placeholder="Example: 0812345678" class="w-full p-3 border-2 border-orange-100 rounded-xl mb-6 outline-none focus:border-orange-500">
            
            <button onclick="saveConfig()" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition">Save Configuration</button>
        </div>
    </div>

    <div class="w-full max-w-2xl glass-card rounded-3xl shadow-2xl overflow-hidden border-4 border-orange-500 relative">
        <header class="bg-orange-500 p-4 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>😋</span> MakanApa?
            </h1>

            <div class="flex items-center gap-4">
                <div id="balance-card">
                    <div class="bg-white text-orange-600 px-3 py-1 rounded-xl shadow text-xs">
                        <div class="font-bold">Balance: Rp <span id="user-balance">0</span></div>
                        <button onclick="openTopupModal()" class="text-[10px] text-orange-500 hover:underline">+ Top Up</button>
                    </div>
                </div>

                <button id="history-btn" onclick="openHistoryModal()" class="text-white text-xs font-semibold px-3 py-1 rounded-lg hover:bg-orange-600 transition border border-white/30">
                    History
                </button>

                <button onclick="openConfig()" class="text-white hover:text-orange-200 transition-all">
                    <i class="fa-solid fa-gear text-1xl"></i>
                </button>

            </div>
        </header>

        <div id="buyer-view" class="block">
            <main id="chat-area" class="h-[60vh] overflow-y-auto p-6 flex flex-col gap-2 bg-transparent"></main>
            
            <div id="habit-box" class="px-6 py-3 bg-white/40 border-t hidden">
                <div class="text-xs font-bold text-orange-600 mb-2">YOUR HABITS:</div>
                <div id="habit-tags" class="flex gap-2"></div>
            </div>

            <footer class="p-4 border-t border-orange-100 bg-white/60 flex flex-col gap-2">
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="Describe what you want to eat..." 
                           class="flex-1 p-3 rounded-xl border-2 border-orange-200 focus:outline-none focus:border-orange-500 bg-white/80">
                    <button id="send-btn" class="bg-orange-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-orange-700 transition">
                        Ask
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <div id="topup-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-2xl">
            <h2 class="text-lg font-bold mb-3">Top Up Balance</h2>
            <input type="number" id="topup-amount" placeholder="Enter amount" class="w-full p-2 border rounded mb-3">
            <button onclick="submitTopup()" class="w-full bg-orange-600 text-white py-2 rounded font-bold">Top Up</button>
            <button onclick="closeTopupModal()" class="w-full mt-2 text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl relative">
            <span class="absolute top-2 right-4 text-2xl cursor-pointer" onclick="closeModal()">&times;</span>
            <h2 class="text-xl font-bold mb-3">Confirm Order</h2>
            <p id="modal-seller-name" class="text-sm text-gray-500"></p>
            <div class="bg-gray-50 p-3 rounded-lg mb-3 text-left">
                <div id="modal-food-name" class="font-bold"></div>
                <div id="modal-price" class="text-orange-600 font-bold"></div>
            </div>
            <input type="number" id="order-qty" value="1" min="1" class="w-full mb-2 p-2 border rounded">
            <input type="text" id="buyer-name" class="w-full mb-2 p-2 border rounded" placeholder="Your name">
            <div class="flex gap-2 mb-3">
                <input type="text" id="order-address" class="flex-1 p-2 border rounded" placeholder="Delivery address">
                <button onclick="chooseAddress()" class="bg-orange-500 text-white px-3 rounded">📍</button>
            </div>
            <div id="order-total" class="font-bold text-orange-600 mb-3"></div>
            <a id="whatsapp-link" class="block w-full bg-green-500 text-white py-2 rounded font-bold text-center">Order via WhatsApp</a>
        </div>
    </div>

    <div id="history-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white w-full max-w-md rounded-2xl relative max-h-[80vh] flex flex-col shadow-xl">
            <div class="p-4 border-b flex justify-between items-center">
                <div>
                    <div class="font-bold text-lg">Transaction History</div>
                    <div class="text-sm text-gray-500">Total Spend: <span id="total-spend" class="text-red-500 font-bold">Rp 0</span></div>
                </div>
                <button onclick="closeHistoryModal()" class="text-gray-500 hover:text-black text-xl">✕</button>
            </div>
            <div id="history-list" class="p-4 overflow-y-auto flex-1 space-y-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="makanapa.js"></script>
</body>
</html>
